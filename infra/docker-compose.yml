services:

  # ── Kafka (KRaft, single node) ────────────────────────────────────────────
  kafka1:
    image: confluentinc/cp-kafka
    container_name: kafka1
    hostname: kafka1
    mem_limit: 1g
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT'
      KAFKA_LISTENERS: 'INTERNAL://kafka1:19092,CONTROLLER://kafka1:29092,EXTERNAL://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://kafka1:19092,EXTERNAL://localhost:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka1:29092'
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      CLUSTER_ID: 'ciWo7IWazngRchmPES6q5A=='
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      KAFKA_LOG_CLEANER_ENABLE: 'false'
      KAFKA_NUM_NETWORK_THREADS: 6
      KAFKA_NUM_IO_THREADS: 8
      KAFKA_CONNECTIONS_MAX_IDLE_MS: 600000
      KAFKA_REQUEST_TIMEOUT_MS: 30000
      KAFKA_QUEUED_MAX_REQUESTS: 500
      KAFKA_SOCKET_SEND_BUFFER_BYTES: 1048576
      KAFKA_SOCKET_RECEIVE_BUFFER_BYTES: 1048576
      KAFKA_SOCKET_REQUEST_MAX_BYTES: 104857600
      KAFKA_MESSAGE_MAX_BYTES: 10485760
      KAFKA_LOG_FLUSH_INTERVAL_MESSAGES: 20000
      KAFKA_LOG_FLUSH_INTERVAL_MS: 1000
      KAFKA_HEAP_OPTS: '-Xms512m -Xmx768m'
      KAFKA_JVM_PERFORMANCE_OPTS: '-server -XX:+UseG1GC -XX:MaxGCPauseMillis=20 -XX:InitiatingHeapOccupancyPercent=35'
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - retail_net

  # ── Kafka topic initializer ───────────────────────────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka
    container_name: kafka-init
    depends_on:
      kafka1:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      kafka-topics --bootstrap-server kafka1:19092 --create --if-not-exists \
        --topic retail.sales.events \
        --partitions 10 \
        --replication-factor 1

      kafka-topics --bootstrap-server kafka1:19092 --create --if-not-exists \
        --topic retail.anomaly.alerts \
        --partitions 10 \
        --replication-factor 1

      kafka-topics --bootstrap-server kafka1:19092 --create --if-not-exists \
        --topic retail.forecast.results \
        --partitions 10 \
        --replication-factor 1

      echo '--- Topics created ---'
      kafka-topics --bootstrap-server kafka1:19092 --list
      "
    restart: "no"
    networks:
      - retail_net

  # ── TimescaleDB ───────────────────────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: timescaledb
    mem_limit: 512m
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: retail
      POSTGRES_USER: retail
      POSTGRES_PASSWORD: retail
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./timescale/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retail -d retail"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - retail_net

  # ── Spark (Java 17, local mode) ───────────────────────────────────────────
  spark:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: spark
    mem_limit: 4g
    environment:
      - PYSPARK_PYTHON=python3
    ports:
      - "4040:4040"   # Spark UI (local mode)
    volumes:
      - ../pipeline:/opt/pipeline
    command: ["tail", "-f", "/dev/null"]
    depends_on:
      kafka1:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    networks:
      - retail_net

  # ── M5 Replay Producer (FastAPI control API) ─────────────────────────────
  replay-producer:
    build:
      context: ../pipeline/replay_producer
      dockerfile: Dockerfile
    container_name: replay-producer
    environment:
      KAFKA_BROKERS: kafka1:19092
      M5_DATA_DIR: /data/m5
      DB_HOST: timescaledb
      DB_PORT: "5432"
      DB_NAME: retail
      DB_USER: retail
      DB_PASS: retail
    volumes:
      - ../data/m5:/data/m5:ro          # M5 CSV'leri read-only
      - ../pipeline/replay_producer:/app # hot-reload
    ports:
      - "8000:8000"                      # API → http://localhost:8000/docs
    depends_on:
      kafka1:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - retail_net

  # ── Streamlit dashboard ───────────────────────────────────────────────────
  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    container_name: streamlit-dashboard
    environment:
      POSTGRES_DSN: postgresql://retail:retail@timescaledb:5432/retail
      KAFKA_BROKERS: kafka1:19092
      PRODUCER_API_URL: http://replay-producer:8000
    ports:
      - "8501:8501"
    volumes:
      - ../dashboard:/app         # hot-reload
      - ../evaluation:/evaluation # batch baseline results readable by dashboard
    depends_on:
      timescaledb:
        condition: service_healthy
      kafka1:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - retail_net

  # ── Batch baseline (one-shot; run with: docker compose run batch-baseline) ─
  batch-baseline:
    build:
      context: ../pipeline/stream_processor
      dockerfile: Dockerfile
    container_name: batch-baseline
    environment:
      DB_HOST: timescaledb
    volumes:
      - ../pipeline/stream_processor:/app
      - ../evaluation:/evaluation
    command: [
      "python3", "/app/run_batch_baseline.py",
      "--db-host", "timescaledb",
      "--out-dir", "/evaluation/experiments"
    ]
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: "no"
    networks:
      - retail_net

  # ── Stream Consumer (Python — Kafka → sales_events + pipeline_metrics) ──────
  stream-consumer:
    build:
      context: ../pipeline/stream_processor
      dockerfile: Dockerfile
    container_name: stream-consumer
    environment:
      KAFKA_BROKERS: kafka1:19092
      DB_HOST: timescaledb
      FROM_BEGINNING: "true"
    volumes:
      - ../pipeline/stream_processor:/app   # hot-reload
    depends_on:
      kafka1:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - retail_net

  # ── Spark Structured Streaming (Kafka → sales_features) ───────────────────
  spark-streaming:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: spark-streaming
    mem_limit: 4g
    environment:
      KAFKA_PACKAGE: ""      # JARs pre-loaded via --jars below
      PYSPARK_PYTHON: python3
    volumes:
      - ../pipeline:/opt/pipeline
    command: [
      "spark-submit",
      "--jars", "/opt/spark-kafka-jars/spark-sql-kafka-0-10_2.12-3.5.1.jar,/opt/spark-kafka-jars/spark-token-provider-kafka-0-10_2.12-3.5.1.jar,/opt/spark-kafka-jars/kafka-clients-3.4.1.jar,/opt/spark-kafka-jars/commons-pool2-2.11.1.jar",
      "--conf", "spark.driver.memory=2g",
      "--conf", "spark.sql.shuffle.partitions=10",
      "/opt/pipeline/stream_processor/feature_pipeline.py",
      "--kafka-server", "kafka1:19092",
      "--db-host", "timescaledb",
      "--starting-offsets", "earliest"
    ]
    depends_on:
      kafka1:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - retail_net

  # ── Anomaly Detector (sales_features → anomaly_alerts) ────────────────────
  anomaly-detector:
    build:
      context: ../pipeline/stream_processor
      dockerfile: Dockerfile
    container_name: anomaly-detector
    volumes:
      - ../pipeline/stream_processor:/app
    command: [
      "python3", "anomaly_detector.py",
      "--db-host", "timescaledb",
      "--kafka-server", "kafka1:19092"
    ]
    depends_on:
      kafka1:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - retail_net

  # ── Demand Forecaster (sales_features → forecast_results) ─────────────────
  demand-forecaster:
    build:
      context: ../pipeline/stream_processor
      dockerfile: Dockerfile
    container_name: demand-forecaster
    volumes:
      - ../pipeline/stream_processor:/app
    command: [
      "python3", "demand_forecaster.py",
      "--db-host", "timescaledb",
      "--kafka-server", "kafka1:19092",
      "--store", "ALL"
    ]
    depends_on:
      kafka1:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - retail_net

networks:
  retail_net:
    name: retail_net

volumes:
  timescale_data:
